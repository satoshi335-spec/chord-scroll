<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>弾き語りスクロール</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Fira+Code:wght@400;600&family=Oswald:wght@300;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0d0f; --surface:#16161a; --border:#2a2a30;
  --chord:#f4c842; --lyric:#e8e8f0; --lyric-dim:#505060;
  --accent:#e84545; --capo:#5bc8af; --ui-bg:rgba(13,13,15,0.96);
  --hl-bg:rgba(244,200,66,0.12); --hl-border:#f4c842;
  --next-bg:rgba(91,200,175,0.08); --next-border:#5bc8af;
  --fs:24px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%}
body{background:var(--bg);color:var(--lyric);font-family:'Noto Sans JP',sans-serif;overflow:hidden;display:flex;flex-direction:column}
#topbar{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
#song-title{font-family:'Oswald',sans-serif;font-size:15px;font-weight:600;letter-spacing:.08em;color:var(--chord);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;min-width:60px}
.ctrl-group{display:flex;align-items:center;gap:5px;flex-shrink:0}
.ctrl-label{font-size:10px;color:var(--lyric-dim);letter-spacing:.05em;text-transform:uppercase}
.btn{background:var(--border);border:none;color:var(--lyric);font-size:14px;padding:8px 13px;border-radius:6px;cursor:pointer;font-family:'Fira Code',monospace;user-select:none;-webkit-user-select:none;touch-action:manipulation;min-height:38px}
.btn:active{background:#3a3a44}
.btn-accent{background:var(--accent);color:#fff;font-weight:700;min-width:80px;font-size:15px}
.btn-accent:active{background:#c53333}
.btn-green{background:#1e5c40;color:#7fe0b8;font-weight:700}
.btn-blue{background:#1a3a5c;color:#7ab8f0;font-weight:700}
#setlist-btn{background:none;border:1px solid var(--border);color:var(--chord);font-size:20px;width:40px;height:40px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;touch-action:manipulation}
#key-display{font-family:'Fira Code',monospace;font-size:15px;font-weight:600;color:var(--chord);min-width:30px;text-align:center}
#capo-display{font-family:'Fira Code',monospace;font-size:14px;color:var(--capo);min-width:24px;text-align:center}
#speed-display{font-family:'Fira Code',monospace;font-size:14px;color:var(--lyric-dim);min-width:36px;text-align:center}
#fs-badge{font-family:'Fira Code',monospace;font-size:13px;color:var(--lyric-dim);min-width:26px;text-align:center}
#next-chord-bar{display:none;flex-shrink:0;padding:4px 14px;background:linear-gradient(90deg,rgba(91,200,175,0.15),transparent);border-bottom:1px solid rgba(91,200,175,0.2);font-family:'Fira Code',monospace;font-size:13px;color:var(--capo)}
#next-chord-bar.visible{display:flex;align-items:center;gap:8px}
.nxt-label{opacity:.6;font-size:11px}
.nxt-chord{font-size:18px;font-weight:600}
#scroll-wrap{flex:1;min-height:0;overflow:hidden;position:relative}
#scroll-content{padding:14px 16px 120px;will-change:transform;transform:translateY(0)}

/* 横向き */
@media (orientation:landscape){
  :root{--fs:32px}
  #topbar{flex-wrap:nowrap;padding:4px 10px;gap:6px;min-height:0}
  #song-title{font-size:14px;min-width:40px;max-width:120px}
  .ctrl-label{display:none}
  .btn{padding:6px 12px;font-size:13px;min-height:36px}
  .btn-accent{min-width:76px;font-size:14px;min-height:36px}
  #setlist-btn{width:36px;height:36px;font-size:19px}
  #key-display{font-size:14px;min-width:24px}
  #capo-display{font-size:13px;min-width:20px}
  #fs-badge{font-size:12px;min-width:20px}
  #next-chord-bar{padding:3px 12px;font-size:12px}
  .nxt-chord{font-size:20px}
  #scroll-content{padding:4px 8px 80px}
  #overlay{padding:8px 12px 10px;gap:10px}
  #tap-btn{min-width:62px;padding:7px 12px}
  #tap-bpm{font-size:17px}
  .song-line{padding:2px 6px;width:100%}
  .word{margin-bottom:1px}
  .section-label{margin:6px 0 1px;font-size:10px}
  .line-sep{margin:2px 0 3px}
}

/* 縦向き */
@media (orientation:portrait){
  #topbar{flex-wrap:wrap;padding:6px 10px;gap:6px}
  #setlist-btn{order:1;width:44px;height:44px;font-size:22px}
  #song-title{order:2;flex:1;font-size:16px}
  #karaoke-btn{order:3}
  #vocal-btn{order:4}
  #edit-btn{order:5}
  .ctrl-group{order:6}
  .btn{padding:8px 12px;font-size:14px}
  #overlay{padding:16px 12px 12px;gap:10px}
  #tap-btn{min-width:60px;padding:8px 12px}
  .btn-accent{min-width:84px}
}

.section-label{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin:10px 0 2px;opacity:.5;display:flex;align-items:center;padding:4px 2px;cursor:pointer;touch-action:manipulation}
.at-badge{font-size:11px;color:#fff;margin-left:6px;background:rgba(180,40,40,0.7);border:1px solid rgba(232,69,69,0.6);padding:2px 8px;border-radius:3px;font-family:'Fira Code',monospace;font-weight:600}
@media (orientation:landscape){.section-label{font-size:9px;margin:5px 0 1px;opacity:.45}}

/* 待機ブロック（前奏・間奏など） */
.wait-block{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 16px;margin:4px 0;border-radius:8px;background:rgba(232,69,69,0.08);border:1px solid rgba(232,69,69,0.2);cursor:pointer;touch-action:manipulation}
.wait-label{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.12em;color:var(--accent);opacity:.8;margin-bottom:4px;text-transform:uppercase}
.wait-countdown{font-family:'Fira Code',monospace;font-size:40px;font-weight:600;color:var(--accent);line-height:1}
.wait-progress-wrap{width:100%;height:5px;background:rgba(232,69,69,0.15);border-radius:3px;margin-top:8px;overflow:hidden}
.wait-progress-bar{height:100%;background:var(--accent);border-radius:3px;width:100%}
.wait-block.counting{background:rgba(232,69,69,0.16);border-color:var(--accent)}

/* ボーカルモード: コード非表示・歌詞大きく */
body.vocal-mode .chord-span{display:none!important}
body.vocal-mode .lyric-span{font-size:calc(var(--fs)*1.2)}
body.vocal-mode .song-line{padding:8px 8px}
#vocal-indicator{display:none;font-size:10px;color:var(--accent);font-family:'Fira Code',monospace;letter-spacing:.08em}
body.vocal-mode #vocal-indicator{display:inline}

/* time指定セクションのプログレスバー */
.time-section{
  display:flex;flex-direction:column;padding:8px 10px;margin:2px 0;
  border-radius:6px;background:rgba(91,200,175,0.06);border-left:3px solid var(--capo);
}
.time-section-label{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--capo);opacity:.8;margin-bottom:4px}
.time-section-bar-wrap{width:100%;height:4px;background:rgba(91,200,175,0.15);border-radius:2px;overflow:hidden}
.time-section-bar{height:100%;background:var(--capo);border-radius:2px;width:0%;transition:width .1s linear}
.song-line{
  display:flex;flex-direction:row;flex-wrap:wrap;
  align-items:flex-end;
  margin-bottom:0;line-height:1;
  padding:4px 8px;border-radius:6px;
  border-left:3px solid transparent;
  transition:background .25s,border-color .25s;
  cursor:pointer;touch-action:manipulation;
}
.song-line.active-line{background:var(--hl-bg);border-left-color:var(--hl-border)}
.song-line.next-line{background:var(--next-bg);border-left-color:var(--next-border)}
/* word = コード+歌詞の縦ペア */
.word{
  display:inline-flex;flex-direction:column;align-items:flex-start;
  margin-right:0;margin-bottom:4px;
}
.chord-span{
  font-family:'Fira Code',monospace;
  font-size:calc(var(--fs)*0.6);font-weight:600;
  color:var(--chord);
  line-height:1;white-space:nowrap;
  padding-bottom:0;
  height:calc(var(--fs)*0.7);
  display:block;
  overflow:hidden;
}
.chord-span.empty{visibility:hidden}
.song-line.active-line .chord-span:not(.empty){color:#ffe066}
.lyric-span{
  font-size:var(--fs);color:var(--lyric);
  white-space:normal;word-break:break-all;
  line-height:1.15;display:block;
}
.song-line.active-line .lyric-span{color:#fff;font-weight:700}
.song-line.next-line .lyric-span{color:#c0c0d8}
.line-sep{width:100%;height:1px;background:var(--border);margin:3px 0 6px;opacity:.3}
#overlay{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(transparent,var(--ui-bg) 50%);padding:20px 14px 14px;display:flex;justify-content:center;align-items:center;gap:10px;pointer-events:none;flex-wrap:wrap}
#overlay>*{pointer-events:all;touch-action:manipulation}
#tap-btn{background:#2a1a00;border:2px solid var(--chord);color:var(--chord);font-family:'Fira Code',monospace;font-size:14px;font-weight:700;padding:8px 14px;border-radius:8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:66px;user-select:none;-webkit-user-select:none;touch-action:manipulation}
#tap-bpm{font-size:18px;line-height:1}
#tap-label{font-size:10px;opacity:.6;letter-spacing:.08em}
.panel{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;flex-direction:column}
.panel.open{display:flex}
.panel-header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.panel-title{font-family:'Oswald',sans-serif;font-size:15px;color:var(--chord);letter-spacing:.1em;flex:1}
#setlist-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px;display:flex;flex-direction:column;gap:5px}
.setlist-item{display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;gap:8px;cursor:pointer;touch-action:manipulation}
.setlist-item.active{border-color:var(--chord);background:#1c1a08}
.item-num{font-family:'Fira Code',monospace;font-size:11px;color:var(--lyric-dim);min-width:18px}
.item-info{flex:1;overflow:hidden}
.item-title{font-size:14px;color:var(--lyric);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-meta{font-family:'Fira Code',monospace;font-size:10px;color:var(--lyric-dim);margin-top:3px}
.item-meta .capo-tag{color:var(--capo)}
.item-actions{display:flex;gap:4px}
.icon-btn{background:none;border:1px solid var(--border);color:var(--lyric-dim);font-size:13px;width:30px;height:30px;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation}
.icon-btn.del{color:var(--accent);border-color:#3a1515}
.setlist-empty{text-align:center;color:var(--lyric-dim);font-size:13px;padding:40px 20px;line-height:2.2}
#setlist-footer{padding:10px 12px;background:var(--surface);border-top:1px solid var(--border);display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap}
#editor-panel .panel-body{flex:1;display:flex;flex-direction:column;padding:10px 14px 12px;gap:7px;overflow:hidden}
.hint{font-size:11px;color:var(--lyric-dim);line-height:1.75}
.hint code{color:var(--chord);font-family:'Fira Code',monospace}
textarea{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--lyric);font-family:'Fira Code',monospace;font-size:13px;padding:11px;border-radius:6px;resize:none;outline:none;line-height:1.75;-webkit-overflow-scrolling:touch}
.editor-actions{display:flex;gap:8px;justify-content:flex-end}
#scan-panel .panel-body{flex:1;display:flex;flex-direction:column;align-items:center;padding:14px;gap:12px;overflow-y:auto;-webkit-overflow-scrolling:touch}
#scan-drop-area{width:100%;max-width:480px;border:2px dashed var(--border);border-radius:10px;padding:28px 20px;text-align:center;color:var(--lyric-dim);font-size:13px;cursor:pointer;line-height:2;touch-action:manipulation}
#scan-result{width:100%;max-width:480px;background:var(--surface);border:1px solid var(--border);color:var(--lyric);font-family:'Fira Code',monospace;font-size:12px;padding:10px;border-radius:6px;resize:none;outline:none;line-height:1.7;min-height:140px;-webkit-overflow-scrolling:touch}
.scan-status{font-size:12px;color:var(--capo);font-family:'Fira Code',monospace}
input[type=file]{display:none}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--chord);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="topbar">
  <button id="setlist-btn" onclick="openSetlist()">&#9776;</button>
  <div id="song-title" onclick="openSetlist()">読み込み中...</div>
  <div class="ctrl-group">
    <span class="ctrl-label">KEY</span>
    <button class="btn" onclick="transposeKey(-1)">&#9664;</button>
    <span id="key-display">C</span>
    <button class="btn" onclick="transposeKey(+1)">&#9654;</button>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">CAPO</span>
    <button class="btn" onclick="changeCapo(-1)">&#9664;</button>
    <span id="capo-display">&#8212;</span>
    <button class="btn" onclick="changeCapo(+1)">&#9654;</button>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">SIZE</span>
    <button class="btn" onclick="changeFS(-2)">A-</button>
    <span id="fs-badge">24</span>
    <button class="btn" onclick="changeFS(+2)">A+</button>
  </div>
  <button class="btn" id="karaoke-btn" onclick="toggleKaraokeMode()">&#127908;</button>
  <button class="btn" id="vocal-btn" onclick="toggleVocalMode()" title="ボーカルモード">&#127897; <span id="vocal-indicator">VOCAL</span></button>
  <button class="btn" id="edit-btn" onclick="editCurrentSong()">&#9998;</button>
</div>

<div id="next-chord-bar">
  <span class="nxt-label">NEXT</span>
  <span id="nxt-chord-text" class="nxt-chord"></span>
</div>

<!-- メモバー -->
<div id="memo-bar" style="display:none;flex-shrink:0;padding:4px 14px;background:linear-gradient(90deg,rgba(244,200,66,0.08),transparent);border-bottom:1px solid rgba(244,200,66,0.15);font-size:11px;color:#c8b84a;font-family:'Noto Sans JP',sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
  &#128221; <span id="memo-text"></span>
</div>

<div id="scroll-wrap">
  <div id="scroll-content"></div>
</div>

<div id="overlay">
  <button class="btn" onclick="prevSong()">&#9198;</button>
  <button id="tap-btn" onclick="tapTempo()">
    <span id="tap-bpm">TAP</span>
    <span id="tap-label">TEMPO</span>
  </button>
  <div class="ctrl-group">
    <span class="ctrl-label">SPEED</span>
    <button class="btn" onclick="changeSpeed(-5)">&#8722;</button>
    <span id="speed-display">&#8212;</span>
    <button class="btn" onclick="changeSpeed(+5)">&#43;</button>
  </div>
  <button class="btn btn-accent" id="play-btn" onclick="toggleScroll()">&#9654; START</button>
  <button class="btn" onclick="nextSong()">&#9197;</button>
</div>

<!-- SETLIST -->
<div id="setlist-panel" class="panel">
  <div class="panel-header">
    <span class="panel-title">&#128203; セットリスト</span>
    <button class="btn" onclick="closeSetlist()">&#10005; 閉じる</button>
  </div>
  <div id="setlist-list"></div>
  <div id="setlist-footer">
    <button class="btn btn-green" style="flex:1" onclick="openNewSongEditor()">&#43; 手動で追加</button>
    <button class="btn btn-blue" style="flex:1" onclick="openScanPanel()">&#128247; スキャン</button>
    <button class="btn" style="flex:1" onclick="exportData()">&#128229; 書き出し</button>
    <button class="btn" style="flex:1" onclick="document.getElementById('import-input').click()">&#128228; 読み込み</button>
    <input type="file" id="import-input" accept=".json" style="display:none" onchange="importData(this)">
  </div>
</div>

<!-- EDITOR -->
<div id="editor-panel" class="panel">
  <div class="panel-header">
    <span class="panel-title" id="editor-title">&#128221; 曲を編集</span>
    <button class="btn" onclick="closeEditor()">&#10005; キャンセル</button>
  </div>
  <div class="panel-body">
    <div class="hint">
      <code>title: 曲名</code> &#183; <code>key: G</code> &#183; <code>capo: 2</code> &#183; <code>vocal: off</code><br>
      コードは <code>[G]夏の[Em]終わり</code> の形式<br>
      セクションをタップ&#8594;曲開始からの経過秒を入力<br>
      <code>[&#12452;&#12531;&#12488;&#12525; at:0]</code> <code>[A&#12513;&#12525; at:16]</code> <code>[&#38291;&#22594; at:72]</code>
    </div>
    <textarea id="song-input" spellcheck="false" style="flex:3"></textarea>
    <div style="font-size:10px;color:var(--lyric-dim);margin-top:4px">&#128221; メモ（ライブ注意事項など）</div>
    <textarea id="memo-input" spellcheck="false" placeholder="例: Dサビで転調注意 / テンポ少し速め / MCあり" style="flex:1;min-height:60px;max-height:100px"></textarea>
    <div class="editor-actions">
      <button class="btn btn-accent" onclick="applySong()">&#10003; 保存</button>
    </div>
  </div>
</div>

<!-- SCAN -->
<div id="scan-panel" class="panel">
  <div class="panel-header">
    <span class="panel-title">&#128247; コード譜を読み込む</span>
    <button class="btn" onclick="closeScanPanel()">&#10005; 閉じる</button>
  </div>
  <div class="panel-body">
    <div style="display:flex;gap:8px;width:100%;max-width:480px;flex-wrap:wrap">
      <button class="btn btn-blue" style="flex:1;padding:10px;font-size:13px" onclick="document.getElementById('cam-input').click()">&#128247; カメラで撮影</button>
      <button class="btn" style="flex:1;padding:10px;font-size:13px" onclick="document.getElementById('file-input').click()">&#128444; 画像を選択（複数可）</button>
      <button class="btn btn-green" style="flex:1;padding:10px;font-size:13px" onclick="document.getElementById('pdf-input').click()">&#128196; PDF</button>
    </div>
    <input type="file" id="cam-input" accept="image/*" capture="environment" onchange="handleScanFiles(this,'image')">
    <input type="file" id="file-input" accept="image/*" multiple onchange="handleScanFiles(this,'image')">
    <input type="file" id="pdf-input" accept="application/pdf" onchange="handleScanFiles(this,'pdf')">

    <!-- サムネイル一覧 -->
    <div id="scan-thumbs" style="display:none;width:100%;max-width:480px;flex-wrap:wrap;gap:6px;position:relative"></div>

    <div id="scan-drop-area" onclick="document.getElementById('file-input').click()">
      ここをタップして画像を選択（複数枚OK）<br>または「カメラで撮影」「PDF」<br>
      <small style="opacity:.5">コード譜・手書き譜・印刷譜・PDF 対応</small>
    </div>

    <!-- 解析ボタン -->
    <div id="scan-analyze-wrap" style="display:none;width:100%;max-width:480px">
      <button class="btn btn-blue" id="scan-analyze-btn" onclick="startScanAnalysis()" style="width:100%;padding:10px;font-size:14px">
        &#9654; まとめてAI解析（<span id="scan-count">0</span>枚）
      </button>
    </div>

    <div id="scan-overlay-full" style="display:none;width:100%;max-width:480px;padding:20px;text-align:center;background:var(--surface);border-radius:8px;border:1px solid var(--border)">
      <div class="spinner" style="width:28px;height:28px;border-width:3px;margin:0 auto 10px"></div>
      <div style="color:var(--chord);font-size:13px;font-family:'Fira Code',monospace" id="scan-progress-text">AI解析中...</div>
    </div>

    <div id="scan-status-wrap" style="display:none;width:100%;max-width:480px">
      <span class="scan-status" id="scan-status-text"></span>
    </div>
    <textarea id="scan-result" placeholder="AI解析結果がここに表示されます。確認・修正してから追加してください。" spellcheck="false"></textarea>
    <div style="display:flex;gap:8px;width:100%;max-width:480px;justify-content:flex-end">
      <button class="btn" onclick="clearScan()">クリア</button>
      <button class="btn btn-accent" id="scan-add-btn" onclick="addScannedSong()" disabled>&#43; セットリストに追加</button>
    </div>
  </div>
</div>

<script>
// ==== SAMPLES (文字列連結) ====
var SAMPLE1 = "title: 夏の終わりに\nkey: G\ncapo: 2\n\n[Verse]\n[G]夏の[Em]終わりに[C]君と[D]歩いた\n[G]あの日の[Em]記憶が[Am]消えない[D]よ\n\n[Chorus]\n[C]また会える[G]日まで[Am]待ちながら\n[Em]星を[C]数えて[D]眠る[G]夜";

// ==== STATE ====
var setlist = [], currentIndex = 0, transpose = 0, capo = 0;
var fontSize = 24, scrollY = 0, scrollSpeed = 0, currentSpeedTarget = 40;
var rafId = null, lastTs = null, editingIndex = -1;
var activeLine = -1, lineElements = [], waitElements = [], timeSectionElements = [];
var karaokeMode = false, tapTimes = [];
var waitTimer = null;
// time:指定セクションの再生管理
var timeSectionActive = -1;  // 現在再生中のtimeSectionのインデックス

// ==== PERSIST ====
function saveState() {
  try {
    localStorage.setItem('cs3_sl', JSON.stringify(setlist));
    localStorage.setItem('cs3_i', currentIndex);
    localStorage.setItem('cs3_fs', fontSize);
  } catch(e) {}
}
function loadState() {
  try {
    var sl = localStorage.getItem('cs3_sl'); if (sl) setlist = JSON.parse(sl);
    var ci = localStorage.getItem('cs3_i'); if (ci !== null) currentIndex = parseInt(ci) || 0;
    var fs = localStorage.getItem('cs3_fs'); if (fs) fontSize = parseInt(fs) || 24;
  } catch(e) {}
  if (!setlist.length) setlist = SAMPLES.map(function(r){ return {raw:r,transpose:0,capo:null}; });
  currentIndex = Math.min(currentIndex, Math.max(0, setlist.length - 1));
}

// ==== NOTES ====
var NS=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'],NF=['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
function nIdx(n){var i=NS.indexOf(n);return i>=0?i:NF.indexOf(n);}
function tNote(n,s){var i=nIdx(n);return i<0?n:NS[(i+s+120)%12];}
function tChord(c,s){if(!s)return c;return c.replace(/[A-G][b#]?/g,function(m){return tNote(m,s);});}

// ==== PARSE ====
function parseSong(raw) {
  var lines=raw.split('\n'), title='\u66f2\u540d\u306a\u3057', origCapo=0, origKey='C', blocks=[], vocalOff=false;
  for (var i=0;i<lines.length;i++) {
    var tl=lines[i].trim();
    if (!tl){blocks.push({type:'blank'});continue;}
    if (/^title:/i.test(tl)){title=tl.replace(/^title:\s*/i,'');continue;}
    if (/^capo:/i.test(tl)){origCapo=parseInt(tl.replace(/^capo:\s*/i,''))||0;continue;}
    if (/^key:/i.test(tl)){origKey=tl.replace(/^key:\s*/i,'').trim();continue;}
    if (/^vocal:\s*off/i.test(tl)){vocalOff=true;continue;}
    if (/^vocal:\s*on/i.test(tl)){vocalOff=false;continue;}
    if (/^\[[^\]]+\]$/.test(tl)){
      var inner=tl.slice(1,-1);
      var atMatch=inner.match(/at:([\d.]+)/i);
      var barsMatch=inner.match(/bars:(\d+)/i);
      var timeMatch=inner.match(/time:([\d.]+)/i);
      var speedMatch=inner.match(/speed:(\d+)/i);
      var atSec=atMatch?parseFloat(atMatch[1]):-1;
      var bars=barsMatch?parseInt(barsMatch[1]):0;
      var timeSec=timeMatch?parseFloat(timeMatch[1]):0;
      var speed=speedMatch?parseInt(speedMatch[1]):0;
      var label=inner
        .replace(/\s*at:[\d.]+/i,'')
        .replace(/\s*bars:\d+/i,'')
        .replace(/\s*time:[\d.]+/i,'')
        .replace(/\s*speed:\d+/i,'')
        .trim();
      var stripped=label.replace(/[A-G][b#]?/g,'').replace(/[mM7sus4aug\u00b0dim9\/+]/g,'');
      if(stripped.trim().length>0){
        if(bars>0){
          blocks.push({type:'wait', label:label, bars:bars, waitMode:'bars', atSec:atSec});
        } else if(timeSec>0){
          blocks.push({type:'wait', label:label, timeSec:timeSec, waitMode:'time', atSec:atSec});
        } else {
          // at: 指定があれば atSection、なければ通常section
          blocks.push({type:'section', label:label, speed:speed, atSec:atSec});
        }
        continue;
      }
    }
    var tokens=[],re=/\[([^\]]+)\]([^\[]*)/g,m,hasChord=false;
    var fb=tl.indexOf('[');
    if(fb>0)tokens.push({chord:'',lyric:tl.slice(0,fb)});
    while((m=re.exec(tl))!==null){hasChord=true;tokens.push({chord:m[1],lyric:m[2]||' '});}
    if(hasChord)blocks.push({type:'chordline',tokens:tokens});
    else blocks.push({type:'lyricline',text:tl});
  }
  return {title:title,origCapo:origCapo,origKey:origKey,blocks:blocks,vocalOff:vocalOff};
}

// ==== RENDER ====
function render() {
  if (!setlist.length) {
    document.getElementById('song-title').textContent='曲がありません';
    document.getElementById('scroll-content').innerHTML='<div style="padding:50px 20px;text-align:center;color:var(--lyric-dim);font-size:15px;line-height:2.5">&#9776; をタップして<br>曲を追加してください</div>';
    lineElements=[];return;
  }
  var song=setlist[currentIndex];
  transpose=song.transpose||0;
  var p=parseSong(song.raw);
  capo=(song.capo!==null&&song.capo!==undefined)?song.capo:p.origCapo;
  document.getElementById('song-title').textContent=p.title;
  updateCapoDisplay();updateKeyDisplay(p.origKey);
  document.documentElement.style.setProperty('--fs',fontSize+'px');
  document.getElementById('fs-badge').textContent=fontSize;

  // メモバー
  var memo=setlist[currentIndex].memo||'';
  var memoBar=document.getElementById('memo-bar');
  if(memo){
    document.getElementById('memo-text').textContent=memo;
    memoBar.style.display='block';
  } else {
    memoBar.style.display='none';
  }

  // vocal mode
  if(p.vocalOff){ document.body.classList.add('vocal-mode'); }
  else { document.body.classList.remove('vocal-mode'); }
  var vBtn=document.getElementById('vocal-btn');
  if(p.vocalOff){vBtn.style.background='var(--accent)';vBtn.style.color='#fff';}
  else{vBtn.style.background='';vBtn.style.color='';}

  var content=document.getElementById('scroll-content');
  content.innerHTML='';lineElements=[];waitElements=[];
  for(var i=0;i<p.blocks.length;i++){
    var block=p.blocks[i];
    if(block.type==='blank'){var s=document.createElement('div');s.className='line-sep';content.appendChild(s);}
    else if(block.type==='section'){
      var el=document.createElement('div');el.className='section-label';
      el.style.cursor='pointer';
      var labelSpan=document.createElement('span');
      labelSpan.textContent=block.label;
      el.appendChild(labelSpan);
      // at: 時刻バッジ（控えめに表示）
      var atBadge=document.createElement('span');
      atBadge.className='at-badge';
      atBadge.textContent=block.atSec>=0?('@'+block.atSec+'s'):'\u23f1';
      atBadge.style.cssText='margin-left:8px;font-size:10px;color:rgba(232,69,69,0.7);font-family:"Fira Code",monospace;cursor:pointer';
      el.appendChild(atBadge);
      if(block.speed>0) el.setAttribute('data-speed',block.speed);
      if(block.atSec>=0) el.setAttribute('data-at',block.atSec);
      (function(blockRef, atBadgeRef){
        el.addEventListener('click',function(){
          editSectionAt(blockRef, atBadgeRef);
        });
      })(block, atBadge);
      content.appendChild(el);
    }
    else if(block.type==='wait'){
      if(block.waitMode==='time'){
        // time:はat:と同様にsectionとして表示（waitブロックは使わない）
        var el2=document.createElement('div');el2.className='section-label';
        el2.style.cursor='pointer';
        var ls2=document.createElement('span');ls2.textContent=block.label;
        el2.appendChild(ls2);
        var ab2=document.createElement('span');ab2.className='at-badge';
        ab2.textContent=block.timeSec+'s(\u5f85\u6a5f)';
        el2.appendChild(ab2);
        content.appendChild(el2);
      } else {
        // bars:のみwaitブロック表示
        var wb=document.createElement('div');wb.className='wait-block';
        wb.setAttribute('data-bars',block.bars);
        wb.setAttribute('data-time','0');
        var wdesc=block.label+' \u00b7 '+block.bars+'\u5c0f\u7bc0';
        var wtop=document.createElement('div');
        wtop.style.cssText='display:flex;align-items:center;justify-content:space-between;width:100%;margin-bottom:4px';
        var wlabel=document.createElement('div');wlabel.className='wait-label';wlabel.textContent=wdesc;
        var wedit=document.createElement('button');
        wedit.textContent='\u5c0f\u7bc0\u6570\u5909\u66f4';
        wedit.style.cssText='background:#2a2a30;border:1px solid #e84545;color:#e84545;font-size:11px;padding:3px 8px;border-radius:4px;cursor:pointer;touch-action:manipulation;font-family:"Fira Code",monospace;flex-shrink:0';
        (function(blockRef, wlabelRef, wbRef){
          wedit.addEventListener('click',function(e){
            e.stopPropagation();
            editWaitBlock(blockRef, wlabelRef, wbRef);
          });
        })(block, wlabel, wb);
        wtop.appendChild(wlabel);wtop.appendChild(wedit);
        var wcount=document.createElement('div');wcount.className='wait-countdown';wcount.textContent=block.bars;
        var wpwrap=document.createElement('div');wpwrap.className='wait-progress-wrap';
        var wpbar=document.createElement('div');wpbar.className='wait-progress-bar';
        wpwrap.appendChild(wpbar);
        wb.appendChild(wtop);wb.appendChild(wcount);wb.appendChild(wpwrap);
        content.appendChild(wb);
        waitElements.push(wb);
        lineElements.push(wb);
      }
    }
    else if(block.type==='chordline'){
      var lineEl=document.createElement('div');lineEl.className='song-line';
      for(var j=0;j<block.tokens.length;j++){
        var tok=block.tokens[j];
        var lyricText=tok.lyric.replace(/\s+$/,'');
        var hasLyric=lyricText.length>0;
        var word=document.createElement('div');word.className='word';
        var ce=document.createElement('span');
        ce.className='chord-span'+(tok.chord?'':' empty');
        ce.textContent=tok.chord?tChord(tok.chord,transpose):'\u00a0';
        var le=document.createElement('span');le.className='lyric-span';
        if(hasLyric){
          le.textContent=tok.lyric;
        } else {
          // コードのみ → 歌詞部分は非表示だが間隔を確保
          le.textContent='\u00a0\u00a0'; // スペース2つで間隔を確保
          le.style.visibility='hidden';
          word.style.marginRight='12px'; // コード間の間隔
        }
        word.appendChild(ce);word.appendChild(le);lineEl.appendChild(word);
      }
      content.appendChild(lineEl);lineElements.push(lineEl);
    } else if(block.type==='lyricline'){
      var ll=document.createElement('div');ll.className='song-line';
      var ww=document.createElement('div');ww.className='word';
      var cc=document.createElement('span');cc.className='chord-span empty';cc.textContent='\u00a0';
      var lll=document.createElement('span');lll.className='lyric-span';lll.textContent=block.text;
      ww.appendChild(cc);ww.appendChild(lll);ll.appendChild(ww);content.appendChild(ll);lineElements.push(ll);
    }
  }
  activeLine=-1;resetScroll();saveState();bindLineTap();
}

// ==== セクション経過時間編集 ====
function editSectionAt(block, atBadgeRef){
  var current=block.atSec>=0?block.atSec:'';
  var newVal=prompt(block.label+' \u306e\u66f2\u958b\u59cb\u304b\u3089\u306e\u7d4c\u904e\u79d2\u6570\u3092\u5165\u529b\uff08\u7a7a\u6b04\u3067\u524a\u9664\uff09',String(current));
  if(newVal===null)return;
  var song=setlist[currentIndex];
  var num=parseFloat(newVal);
  var oldLabel='['+block.label+(block.atSec>=0?' at:'+block.atSec:'')+']';
  if(!isNaN(num)&&num>=0){
    var newLabel='['+block.label+' at:'+num+']';
    song.raw=song.raw.replace(oldLabel,newLabel);
    block.atSec=num;
    atBadgeRef.textContent='@'+num+'s';
    atBadgeRef.closest('.section-label').setAttribute('data-at',num);
  } else {
    var newLabel2='['+block.label+']';
    song.raw=song.raw.replace(oldLabel,newLabel2);
    block.atSec=-1;
    atBadgeRef.textContent='\u23f1';
    atBadgeRef.closest('.section-label').removeAttribute('data-at');
  }
  saveState();
}

function editWaitBlock(block, wlabelEl, wbEl){
  var current = block.waitMode==='time' ? block.timeSec : block.bars;
  var unit = block.waitMode==='time' ? '\u79d2' : '\u5c0f\u7bc0';
  var newVal = prompt(block.label+' \u306e\u6642\u9593\u3092\u5165\u529b\uff08'+unit+'\uff09', String(current));
  if(newVal===null)return;
  var num = parseFloat(newVal);
  if(isNaN(num)||num<0)return;
  var song = setlist[currentIndex];
  var oldPattern, newPattern;
  if(block.waitMode==='time'){
    oldPattern = '['+block.label+' time:'+block.timeSec+']';
    newPattern = '['+block.label+' time:'+num+']';
    block.timeSec = num;
  } else {
    oldPattern = '['+block.label+' bars:'+block.bars+']';
    newPattern = '['+block.label+' bars:'+num+']';
    block.bars = num;
  }
  song.raw = song.raw.replace(oldPattern, newPattern);
  saveState();
  var desc = block.waitMode==='time'
    ? block.label+' '+num+'\u79d2'
    : block.label+' '+num+'\u5c0f\u7bc0';
  wlabelEl.textContent = desc;
  wbEl.querySelector('.wait-countdown').textContent = num;
  wbEl.setAttribute(block.waitMode==='time'?'data-time':'data-bars', num);
}
function toggleVocalMode(){
  document.body.classList.toggle('vocal-mode');
  var on=document.body.classList.contains('vocal-mode');
  var btn=document.getElementById('vocal-btn');
  btn.style.background=on?'var(--accent)':'';
  btn.style.color=on?'#fff':'';
}

// ==== WAIT BLOCK カウントダウン ====
function startWait(wb, seconds, onDone){
  var total=seconds;
  var elapsed=0;
  var interval=100; // 100msごとに更新
  wb.classList.add('counting');
  var cntEl=wb.querySelector('.wait-countdown');
  var barEl=wb.querySelector('.wait-progress-bar');
  if(waitTimer){clearInterval(waitTimer);}
  waitTimer=setInterval(function(){
    elapsed+=interval/1000;
    var remaining=Math.max(0,total-elapsed);
    if(cntEl) cntEl.textContent=remaining>0?Math.ceil(remaining).toString():'GO';
    if(barEl) barEl.style.width=Math.max(0,(1-elapsed/total)*100)+'%';
    if(elapsed>=total){
      clearInterval(waitTimer);waitTimer=null;
      wb.classList.remove('counting');
      if(cntEl) cntEl.textContent=wb.getAttribute('data-bars');
      if(barEl) barEl.style.width='100%';
      onDone();
    }
  },interval);
}

function checkWaitBlocks(){
  if(!waitElements.length)return false;
  var wrap=document.getElementById('scroll-wrap');
  var wr=wrap.getBoundingClientRect();
  var triggerY=wr.top+wr.height*0.28;
  for(var i=0;i<waitElements.length;i++){
    var wb=waitElements[i];
    if(wb.classList.contains('counting'))return true;
    var r=wb.getBoundingClientRect();
    var mid=r.top+r.height/2;
    if(Math.abs(mid-triggerY)<r.height*0.7){
      var seconds=0;
      var dataTime=parseFloat(wb.getAttribute('data-time'))||0;
      var dataBars=parseInt(wb.getAttribute('data-bars'))||0;
      if(dataTime>0){
        // time: 秒数直接指定
        seconds=dataTime;
      } else if(dataBars>0){
        // bars: BPMから計算
        var bpm=parseInt(document.getElementById('tap-bpm').textContent)||80;
        seconds=(dataBars*4*60)/bpm;
      }
      if(seconds<=0)continue;
      var savedSpeed=scrollSpeed;
      stopScroll();
      startWait(wb,seconds,function(){
        scrollSpeed=savedSpeed||currentSpeedTarget;
        document.getElementById('play-btn').textContent='\u23f8 STOP';
        document.getElementById('speed-display').textContent=String(scrollSpeed);
        lastTs=null;rafId=requestAnimationFrame(scrollFrame);
      });
      return true;
    }
  }
  return false;
}

// speed:セクションが画面上部に来たら速度変更
function checkSpeedSections(){
  var wrap=document.getElementById('scroll-wrap');
  var wr=wrap.getBoundingClientRect();
  var triggerY=wr.top+wr.height*0.15; // topbar直下付近
  var labels=document.querySelectorAll('.section-label[data-speed]');
  for(var i=0;i<labels.length;i++){
    var el=labels[i];
    var r=el.getBoundingClientRect();
    if(r.top<=triggerY&&r.bottom>=wr.top){
      var spd=parseInt(el.getAttribute('data-speed'))||0;
      if(spd>0&&spd!==currentSpeedTarget){
        currentSpeedTarget=spd;
        scrollSpeed=spd;
        document.getElementById('speed-display').textContent=String(spd);
      }
      break;
    }
  }
}
function toggleKaraokeMode(){
  karaokeMode=!karaokeMode;
  var btn=document.getElementById('karaoke-btn');
  btn.style.background=karaokeMode?'var(--chord)':'';
  btn.style.color=karaokeMode?'#000':'';
}
function updateHighlight(){
  if(!lineElements.length)return;
  var wrap=document.getElementById('scroll-wrap');
  var wr=wrap.getBoundingClientRect();
  var targetY=wr.top+wr.height*0.28;
  var bestIdx=-1,bestDist=Infinity;
  for(var i=0;i<lineElements.length;i++){
    var r=lineElements[i].getBoundingClientRect();
    var mid=r.top+r.height/2;
    var dist=Math.abs(mid-targetY);
    if(dist<bestDist){bestDist=dist;bestIdx=i;}
  }
  if(bestIdx===activeLine)return;
  activeLine=bestIdx;
  for(var i=0;i<lineElements.length;i++) lineElements[i].classList.remove('active-line','next-line');
  if(activeLine>=0){
    lineElements[activeLine].classList.add('active-line');
    var ni=activeLine+1;
    while(ni<lineElements.length){
      if(lineElements[ni].querySelector('.chord-span:not(.empty)')){lineElements[ni].classList.add('next-line');break;}
      ni++;
    }
    updateNextChordBar(ni);
  }
}
function updateNextChordBar(ni){
  var bar=document.getElementById('next-chord-bar');
  if(ni>=lineElements.length){bar.classList.remove('visible');return;}
  var spans=lineElements[ni].querySelectorAll('.chord-span:not(.empty)');
  var chords=[];for(var i=0;i<spans.length;i++) chords.push(spans[i].textContent.trim());
  if(!chords.length){bar.classList.remove('visible');return;}
  document.getElementById('nxt-chord-text').textContent=chords.slice(0,6).join('  ');
  bar.classList.add('visible');
}
function bindLineTap(){
  for(var i=0;i<lineElements.length;i++){
    (function(idx){lineElements[idx].addEventListener('click',function(){jumpToLine(idx);});})(i);
  }
}
function jumpToLine(idx){
  if(idx<0||idx>=lineElements.length)return;
  var wrap=document.getElementById('scroll-wrap');
  var lr=lineElements[idx].getBoundingClientRect();
  var wr=wrap.getBoundingClientRect();
  scrollY=Math.max(0,scrollY+(lr.top-wr.top)-wr.height*0.28);
  applyScroll();
  if(scrollSpeed===0&&currentSpeedTarget>0)toggleScroll();
}

// ==== SCROLL ====
var songStartTime=0; // STARTを押した時刻
var lastCheckedAt=-1;
function resetScroll(){scrollY=0;lastCheckedAt=-1;applyScroll();stopScroll();}
function applyScroll(){
  var c=document.getElementById('scroll-content'),w=document.getElementById('scroll-wrap');
  var max=Math.max(0,c.scrollHeight-w.clientHeight);
  scrollY=Math.max(0,Math.min(scrollY,max));
  c.style.transform='translateY('+(-scrollY)+'px)';
  updateHighlight();
}
function stopScroll(){
  scrollSpeed=0;
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  lastTs=null;
  document.getElementById('play-btn').textContent='\u25b6 START';
  document.getElementById('speed-display').textContent='\u2014';
}
function toggleScroll(){
  if(scrollSpeed>0||rafId){stopScroll();return;}
  songStartTime=Date.now();
  if(!currentSpeedTarget)currentSpeedTarget=40;
  scrollSpeed=currentSpeedTarget;
  document.getElementById('play-btn').textContent='\u23f8 STOP';
  document.getElementById('speed-display').textContent=String(currentSpeedTarget);
  lastTs=null;rafId=requestAnimationFrame(scrollFrame);
}
function scrollFrame(ts){
  if(!lastTs)lastTs=ts;
  var dt=(ts-lastTs)/1000;lastTs=ts;
  scrollY+=scrollSpeed*dt;
  applyScroll();
  checkSpeedSections();
  checkAtSections();
  var c=document.getElementById('scroll-content'),w=document.getElementById('scroll-wrap');
  if(scrollY>=c.scrollHeight-w.clientHeight){stopScroll();return;}
  if(checkWaitBlocks())return;
  rafId=requestAnimationFrame(scrollFrame);
}

// at: セクション監視 - 経過時間になったらそのセクションに自動ジャンプ
function checkAtSections(){
  var elapsed=(Date.now()-songStartTime)/1000;
  var labels=document.querySelectorAll('.section-label[data-at]');
  for(var i=labels.length-1;i>=0;i--){
    var atSec=parseFloat(labels[i].getAttribute('data-at'));
    if(elapsed>=atSec&&atSec>lastCheckedAt){
      lastCheckedAt=atSec;
      // このセクションの直後の行にジャンプ
      var nextEl=labels[i].nextElementSibling;
      if(nextEl&&nextEl.classList.contains('song-line')){
        var wrap=document.getElementById('scroll-wrap');
        var lr=nextEl.getBoundingClientRect();
        var wr=wrap.getBoundingClientRect();
        scrollY=Math.max(0,scrollY+(lr.top-wr.top)-wr.height*0.28);
      }
      break;
    }
  }
}
// タッチスクロール
var tsy=0, tscy=0, tsHistory=[];

document.getElementById('scroll-wrap').addEventListener('touchstart',function(e){
  tsy=e.touches[0].clientY;
  tscy=scrollY;
  tsHistory=[{y:tsy, t:Date.now()}];
  if(scrollSpeed>0) stopScroll();
},{passive:true});

document.getElementById('scroll-wrap').addEventListener('touchmove',function(e){
  var cy=e.touches[0].clientY;
  scrollY=tscy+(tsy-cy);
  var now=Date.now();
  tsHistory.push({y:cy, t:now});
  tsHistory=tsHistory.filter(function(h){return now-h.t<150;});
  applyScroll();
},{passive:true});

document.getElementById('scroll-wrap').addEventListener('touchend',function(e){
  tscy=scrollY;
  tsHistory=[];
},{passive:true});
function changeSpeed(d){
  currentSpeedTarget=Math.max(5,Math.min(200,currentSpeedTarget+d));
  if(scrollSpeed>0){scrollSpeed=currentSpeedTarget;document.getElementById('speed-display').textContent=String(currentSpeedTarget);}
}

// ==== TAP TEMPO ====
function tapTempo(){
  var now=Date.now();
  tapTimes=tapTimes.filter(function(t){return now-t<3000;});
  tapTimes.push(now);
  if(tapTimes.length<2){document.getElementById('tap-bpm').textContent='TAP';return;}
  var intervals=[];
  for(var i=1;i<tapTimes.length;i++) intervals.push(tapTimes[i]-tapTimes[i-1]);
  var avg=intervals.reduce(function(a,b){return a+b;},0)/intervals.length;
  var bpm=Math.round(60000/avg);
  document.getElementById('tap-bpm').textContent=String(bpm);
  currentSpeedTarget=Math.max(10,Math.min(200,Math.round(fontSize*2.5*bpm/120)));
  if(scrollSpeed>0){scrollSpeed=currentSpeedTarget;document.getElementById('speed-display').textContent=String(currentSpeedTarget);}
}

// ==== KEY/CAPO/FS ====
function updateKeyDisplay(origKey){
  var base=(origKey||'C').match(/^[A-G][b#]?/);base=base?base[0]:'C';
  document.getElementById('key-display').textContent=transpose===0?(origKey||'C'):tNote(base,transpose);
}
function transposeKey(d){
  transpose=((transpose+d)%12+12)%12;if(transpose>6)transpose-=12;
  if(setlist[currentIndex])setlist[currentIndex].transpose=transpose;render();
}
function updateCapoDisplay(){document.getElementById('capo-display').textContent=capo>0?String(capo):'\u2014';}
function changeCapo(d){
  capo=Math.max(0,Math.min(11,capo+d));
  if(setlist[currentIndex])setlist[currentIndex].capo=capo;
  updateCapoDisplay();saveState();
}
function changeFS(d){
  fontSize=Math.max(14,Math.min(42,fontSize+d));
  document.documentElement.style.setProperty('--fs',fontSize+'px');
  document.getElementById('fs-badge').textContent=String(fontSize);saveState();
}

// ==== NAVIGATION ====
function goToSong(i){if(i<0||i>=setlist.length)return;currentIndex=i;render();}
function nextSong(){goToSong((currentIndex+1)%setlist.length);}
function prevSong(){goToSong((currentIndex-1+setlist.length)%setlist.length);}

// ==== SETLIST ====
function openSetlist(){stopScroll();renderSetlistPanel();document.getElementById('setlist-panel').classList.add('open');}
function closeSetlist(){document.getElementById('setlist-panel').classList.remove('open');}
function renderSetlistPanel(){
  var list=document.getElementById('setlist-list');list.innerHTML='';
  if(!setlist.length){list.innerHTML='<div class="setlist-empty">まだ曲がありません。<br>追加してください。</div>';return;}
  setlist.forEach(function(song,i){
    var p=parseSong(song.raw);
    var c=(song.capo!==null&&song.capo!==undefined)?song.capo:p.origCapo;
    var item=document.createElement('div');item.className='setlist-item'+(i===currentIndex?' active':'');
    var num=document.createElement('div');num.className='item-num';num.textContent=String(i+1);
    var info=document.createElement('div');info.className='item-info';
    var t=document.createElement('div');t.className='item-title';t.textContent=p.title;
    var meta=document.createElement('div');meta.className='item-meta';
    meta.innerHTML='KEY: '+(p.origKey||'—')+(c>0?' &middot; <span class="capo-tag">CAPO '+c+'</span>':'');
    if(song.memo){
      var memoEl=document.createElement('div');
      memoEl.style.cssText='font-size:10px;color:#c8b84a;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis';
      memoEl.textContent='📝 '+song.memo;
      info.appendChild(t);info.appendChild(meta);info.appendChild(memoEl);
    } else {
      info.appendChild(t);info.appendChild(meta);
    }
    var actions=document.createElement('div');actions.className='item-actions';
    function mkBtn(label,cls,cb){var b=document.createElement('button');b.className='icon-btn'+(cls?' '+cls:'');b.textContent=label;b.addEventListener('click',function(e){e.stopPropagation();cb();});return b;}
    actions.appendChild(mkBtn('✏️','',function(){closeSetlist();openEditorForIndex(i);}));
    actions.appendChild(mkBtn('↑','',function(){moveSong(i,-1);}));
    actions.appendChild(mkBtn('↓','',function(){moveSong(i,+1);}));
    actions.appendChild(mkBtn('🗑','del',function(){deleteSong(i);}));
    item.appendChild(num);item.appendChild(info);item.appendChild(actions);
    item.addEventListener('click',function(){goToSong(i);closeSetlist();});
    list.appendChild(item);
  });
}
function moveSong(i,dir){var j=i+dir;if(j<0||j>=setlist.length)return;var tmp=setlist[i];setlist[i]=setlist[j];setlist[j]=tmp;if(currentIndex===i)currentIndex=j;else if(currentIndex===j)currentIndex=i;renderSetlistPanel();saveState();}
function deleteSong(i){if(!confirm('「'+parseSong(setlist[i].raw).title+'」を削除しますか？'))return;setlist.splice(i,1);if(currentIndex>=setlist.length)currentIndex=Math.max(0,setlist.length-1);renderSetlistPanel();render();}

// ==== EDITOR ====
function openNewSongEditor(){
  editingIndex=-1;
  document.getElementById('editor-title').textContent='\u65b0\u3057\u3044\u66f2\u3092\u8ffd\u52a0';
  document.getElementById('song-input').value="title: \u65b0\u3057\u3044\u66f2\nkey: G\ncapo: 0\n\n[\u30a4\u30f3\u30c8\u30ed at:0]\n\n[A\u30e1\u30ed at:16]\n[G]\u6b4c\u8a5e\u3092\u3053\u3053\u306b[Em]\u5165\u529b[C][D]\n\n[\u30b5\u30d3 at:48]\n[C]\u30b3\u30fc\u30c9\u306f[G]\u6b4c\u8a5e\u306e[Am]\u76f4\u524d\u306b[D]";
  document.getElementById('memo-input').value='';
  document.getElementById('editor-panel').classList.add('open');
}
function openEditorForIndex(i){
  editingIndex=i;
  document.getElementById('editor-title').textContent='曲を編集';
  document.getElementById('song-input').value=setlist[i].raw;
  document.getElementById('memo-input').value=setlist[i].memo||'';
  document.getElementById('editor-panel').classList.add('open');
}
function editCurrentSong(){stopScroll();openEditorForIndex(currentIndex);}
function closeEditor(){document.getElementById('editor-panel').classList.remove('open');}
function applySong(){
  var raw=document.getElementById('song-input').value.trim();
  var memo=document.getElementById('memo-input').value.trim();
  if(!raw)return;
  if(editingIndex===-1){
    setlist.push({raw:raw,transpose:0,capo:null,memo:memo});
    currentIndex=setlist.length-1;
  } else {
    setlist[editingIndex]={raw:raw,transpose:0,capo:setlist[editingIndex].capo||null,memo:memo};
  }
  closeEditor();render();
}

// ==== EXPORT / IMPORT ====
function exportData(){
  var data={
    version:2,
    exportedAt:new Date().toISOString(),
    songs:setlist.map(function(song){
      return {raw:song.raw, transpose:song.transpose||0, capo:song.capo, memo:song.memo||''};
    })
  };
  var json=JSON.stringify(data,null,2);
  var blob=new Blob([json],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  var d=new Date();
  a.download='chord-scroll-'+d.getFullYear()+('0'+(d.getMonth()+1)).slice(-2)+('0'+d.getDate()).slice(-2)+'.json';
  document.body.appendChild(a);a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
}

function importData(input){
  var file=input.files[0];if(!file)return;input.value='';
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      if(!data.songs||!Array.isArray(data.songs)){alert('ファイルの形式が正しくありません。');return;}
      var mode=confirm(data.songs.length+'曲が見つかりました。\n\n【OK】現在のセットリストに追加\n【キャンセル】全て置き換え');
      if(mode){
        data.songs.forEach(function(s){setlist.push({raw:s.raw,transpose:s.transpose||0,capo:s.capo,memo:s.memo||''});});
      } else {
        if(!confirm('現在の'+setlist.length+'曲を全て削除して置き換えますか？'))return;
        setlist=[];
        data.songs.forEach(function(s){setlist.push({raw:s.raw,transpose:s.transpose||0,capo:s.capo,memo:s.memo||''});});
        currentIndex=0;
      }
      saveState();render();closeSetlist();
      alert('読み込み完了！ '+data.songs.length+'曲。');
    }catch(err){alert('読み込みエラー: '+err.message);}
  };
  reader.readAsText(file);
}
function openScanPanel(){closeSetlist();document.getElementById('scan-panel').classList.add('open');}
function closeScanPanel(){document.getElementById('scan-panel').classList.remove('open');}

// 選択済みファイルデータ [{base64, mediaType, fileType, name}]
var scanFiles=[];

function clearScan(){
  scanFiles=[];
  document.getElementById('scan-thumbs').style.display='none';
  document.getElementById('scan-thumbs').innerHTML='';
  document.getElementById('scan-drop-area').style.display='block';
  document.getElementById('scan-analyze-wrap').style.display='none';
  document.getElementById('scan-overlay-full').style.display='none';
  document.getElementById('scan-result').value='';
  document.getElementById('scan-add-btn').disabled=true;
  document.getElementById('scan-status-wrap').style.display='none';
  document.getElementById('scan-count').textContent='0';
}

function handleScanFiles(input, type){
  var files=Array.prototype.slice.call(input.files);
  if(!files.length)return;
  input.value='';
  var pending=files.length;
  files.forEach(function(file){
    var reader=new FileReader();
    reader.onload=function(e){
      var dataUrl=e.target.result;
      scanFiles.push({
        base64:dataUrl.split(',')[1],
        mediaType:dataUrl.split(';')[0].split(':')[1],
        fileType:type,
        name:file.name,
        dataUrl:dataUrl
      });
      pending--;
      if(pending===0) renderScanThumbs();
    };
    reader.readAsDataURL(file);
  });
}
// 後方互換
function handleScanFile(input,type){handleScanFiles(input,type);}

function renderScanThumbs(){
  var thumbs=document.getElementById('scan-thumbs');
  thumbs.innerHTML='';
  thumbs.style.display='flex';
  document.getElementById('scan-drop-area').style.display='none';
  scanFiles.forEach(function(f,i){
    var wrap=document.createElement('div');
    wrap.style.cssText='position:relative;width:90px;height:90px;flex-shrink:0';
    if(f.fileType==='pdf'){
      var pdiv=document.createElement('div');
      pdiv.style.cssText='width:90px;height:90px;background:var(--surface);border:1px solid var(--border);border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;color:var(--lyric-dim);text-align:center;padding:4px';
      pdiv.innerHTML='&#128196;<br>'+f.name.slice(0,12);
      wrap.appendChild(pdiv);
    } else {
      var img=document.createElement('img');
      img.src=f.dataUrl;
      img.style.cssText='width:90px;height:90px;object-fit:cover;border-radius:6px;border:1px solid var(--border)';
      wrap.appendChild(img);
    }
    // 削除ボタン
    var del=document.createElement('button');
    del.textContent='\u2715';
    del.style.cssText='position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.7);border:none;color:#fff;font-size:11px;width:20px;height:20px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0';
    (function(idx){del.addEventListener('click',function(){scanFiles.splice(idx,1);renderScanThumbs();});})(i);
    // ページ番号
    var num=document.createElement('div');
    num.style.cssText='position:absolute;bottom:2px;left:4px;background:rgba(0,0,0,0.6);color:#fff;font-size:10px;padding:1px 4px;border-radius:3px;font-family:"Fira Code",monospace';
    num.textContent=i+1;
    wrap.appendChild(del);wrap.appendChild(num);
    thumbs.appendChild(wrap);
  });
  // 追加ボタン
  var addMore=document.createElement('button');
  addMore.style.cssText='width:90px;height:90px;background:var(--surface);border:2px dashed var(--border);border-radius:6px;color:var(--lyric-dim);font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;touch-action:manipulation';
  addMore.textContent='+';
  addMore.addEventListener('click',function(){document.getElementById('file-input').click();});
  thumbs.appendChild(addMore);
  // 解析ボタン更新
  document.getElementById('scan-count').textContent=scanFiles.length;
  document.getElementById('scan-analyze-wrap').style.display=scanFiles.length>0?'block':'none';
}

async function startScanAnalysis(){
  if(!scanFiles.length)return;
  document.getElementById('scan-analyze-wrap').style.display='none';
  document.getElementById('scan-overlay-full').style.display='block';
  document.getElementById('scan-status-wrap').style.display='none';
  document.getElementById('scan-result').value='';
  document.getElementById('scan-add-btn').disabled=true;

  var prog=document.getElementById('scan-progress-text');

  // 複数枚を順番に解析して結果を結合
  var results=[];
  for(var i=0;i<scanFiles.length;i++){
    prog.textContent=(i+1)+'/'+scanFiles.length+'\u679a\u76ee\u89e3\u6790\u4e2d...';
    var f=scanFiles[i];
    try{
      var resp=await fetch('/api/scan',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({base64:f.base64,mediaType:f.mediaType,fileType:f.fileType})
      });
      var responseText=await resp.text();
      var data;
      try{data=JSON.parse(responseText);}catch(pe){data={error:responseText.slice(0,100)};}
      if(data.error){results.push('// \u30da\u30fc\u30b8'+(i+1)+'\u30a8\u30e9\u30fc: '+data.error);}
      else{results.push(data.result);}
    }catch(err){
      results.push('// \u30da\u30fc\u30b8'+(i+1)+'\u901a\u4fe1\u30a8\u30e9\u30fc: '+err.message);
    }
  }

  document.getElementById('scan-overlay-full').style.display='none';
  var combined=results.join('\n\n');
  document.getElementById('scan-result').value=combined;
  document.getElementById('scan-status-wrap').style.display='block';
  document.getElementById('scan-status-text').textContent='\u2713 '+scanFiles.length+'\u679a\u306e\u89e3\u6790\u5b8c\u4e86\u3002\u78ba\u8a8d\u30fb\u4fee\u6b63\u3057\u3066\u304b\u3089\u8ffd\u52a0\u3057\u3066\u304f\u3060\u3055\u3044\u3002';
  document.getElementById('scan-add-btn').disabled=false;
}

function addScannedSong(){
  var raw=document.getElementById('scan-result').value.trim();
  if(!raw)return;
  setlist.push({raw:raw,transpose:0,capo:null});
  currentIndex=setlist.length-1;
  closeScanPanel();clearScan();render();
}

// ==== INIT ====
window.onerror=function(msg,src,line){var div=document.createElement('div');div.style.cssText='position:fixed;top:0;left:0;right:0;background:#c00;color:#fff;font-size:12px;padding:8px;z-index:9999;font-family:monospace';div.textContent='Error: '+msg+' (line '+line+')';document.body.appendChild(div);};
loadState();
render();
</script>
